apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  values:
    prometheus:
      prometheusSpec:
        nodeSelector:
          storage: ssd
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
    grafana:
      nodeSelector:
        storage: ssd
      resources:
        requests:
          cpu: 100m
          memory: 192Mi
        limits:
          cpu: 300m
          memory: 384Mi
